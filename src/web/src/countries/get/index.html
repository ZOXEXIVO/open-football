{% extends "layout.html" %}

{% block submenu %}
<div class="fm-tabbar">
    <a class="fm-tab" href="/{{ lang }}/countries/{{ country_slug }}">{{ i18n.t("squad") }}</a>
    <a class="fm-tab" href="/{{ lang }}/countries/{{ country_slug }}/staff">{{ i18n.t("staff") }}</a>
    <a class="fm-tab active" href="/{{ lang }}/countries/{{ country_slug }}/leagues">{{ i18n.t("leagues") }}</a>
</div>
{% endblock %}

{% block content %}
<div class="fm-page">
    <section class="fm-panel">
        <div class="fm-panel-head">
            <h3>{{ i18n.t("leagues") }}</h3>
        </div>
        <div class="fm-league-list">
            {% for league in leagues %}
            <a href="/{{ lang }}/leagues/{{ league.slug }}" class="fm-league-item">
                <i class="fa fa-trophy"></i>
                <span>{{ league.name }}</span>
            </a>
            {% endfor %}
        </div>
    </section>
</div>
{% endblock %}
