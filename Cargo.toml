[workspace]
members = ["src/core", "src/database", "src/web"]

[workspace.package]
version = "0.7.3"
authors = ["ZOXEXIVO <zoxexivo@gmail.com>"]
edition = "2024"

[package]
name = "open_football"
version.workspace = true
authors.workspace = true
edition.workspace = true

[dependencies]
core = { path = "src/core" }
web = { path = "src/web" }
database = { path = "src/database" }
log = { version = "0.4.29", features = ["release_max_level_info"] }
env_logger = "0.11.10"
color-eyre = "0.6.5"
tokio = { version = "1.50.0", features = ["full"] }
hostname = "0.4.2"

[target.'cfg(target_os = "linux")'.dependencies]
tikv-jemallocator = "0.6"