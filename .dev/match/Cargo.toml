[package]
name = "dev_match"
version = "0.1.0"
edition = "2024"

[dependencies]
core = { path = "../../src/core" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
flate2 = "1"
rayon = "1.11"
tokio = { version = "1", features = ["full"] }
axum = "0.8"
tower-http = { version = "0.6", features = ["cors"] }
env_logger = "0.11"
log = "0.4"
