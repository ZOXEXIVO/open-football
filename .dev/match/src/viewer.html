<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Dev Match Viewer</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0e1419; color: #c8d6e0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
.header { text-align: center; padding: 18px 0 10px; }
.score { font-size: 28px; font-weight: 700; letter-spacing: 2px; }
.score .sep { color: #3a4f5c; margin: 0 12px; }
.team-home { color: #6ba3d6; }
.team-away { color: #d6836b; }
#match-container { display: flex; justify-content: center; padding: 0 20px; }
#pixi-container canvas { border-radius: 6px; }
.controls { display: flex; align-items: center; justify-content: center; gap: 14px; padding: 8px 20px; }
.controls button { background: #1c2830; border: 1px solid #3a4f5c; color: #c8d6e0; padding: 6px 16px; border-radius: 3px; cursor: pointer; font-size: 12px; }
.controls button:hover { background: #2a3a46; }
.controls button.active { background: #2a5a3a; border-color: #4a9d5b; }
.slider-wrap { position: relative; flex: 1; max-width: 600px; height: 22px; }
#time-slider { width: 100%; accent-color: #4a9d5b; position: absolute; left: 0; top: 8px; margin: 0; }
.goal-markers { position: absolute; left: 0; right: 0; top: 0; height: 100%; pointer-events: none; }
.goal-marker { position: absolute; top: 0; width: 12px; height: 22px; margin-left: -6px; font-size: 12px; line-height: 22px; text-align: center; text-shadow: 0 0 2px #000; }
.goal-marker-home { color: #6ba3d6; }
.goal-marker-away { color: #d6836b; }
#time-display { font-size: 13px; font-variant-numeric: tabular-nums; min-width: 50px; text-align: center; }
#status { font-size: 11px; color: #7a8c98; min-width: 80px; }
#ball-coords { font-size: 12px; color: #7a8c98; font-variant-numeric: tabular-nums; min-width: 160px; text-align: center; letter-spacing: 0.5px; }
#ball-coords .label { color: #4a5a66; margin-right: 4px; }
#ball-coords .val { color: #c8d6e0; }
</style>
</head>
<body>
<div class="header">
    <div class="score">
        <span class="team-home">Home FC</span>
        <span id="home-score">0</span>
        <span class="sep">-</span>
        <span id="away-score">0</span>
        <span class="team-away">Away United</span>
    </div>
    <div class="controls">
        <button id="btn-play">Play</button>
        <button id="btn-speed">1x</button>
        <button id="btn-states" class="active">States</button>
        <div class="slider-wrap">
            <input type="range" id="time-slider" min="0" max="1000" value="0">
            <div class="goal-markers" id="goal-markers"></div>
        </div>
        <span id="time-display">0'</span>
        <span id="ball-coords"><span class="label">ball</span><span class="val" id="ball-coords-val">—</span></span>
        <span id="status"></span>
    </div>
</div>
<div id="match-container">
    <div id="pixi-container"></div>
</div>

<script src="/js/pixi.min.js"></script>
<script src="/match_data.js"></script>
<script>
(function() {
    const matchId = MATCH_ID;
    const matchTimeMsTotal = MATCH_TIME_MS;
    const playersData = PLAYERS_DATA;
    const goalsData = GOALS_DATA;
    const homeColorBg = HOME_BG;
    const homeColorFg = HOME_FG;
    const awayColorBg = AWAY_BG;
    const awayColorFg = AWAY_FG;

    document.getElementById('home-score').textContent = HOME_GOALS;
    document.getElementById('away-score').textContent = AWAY_GOALS;

    const canvasWidth = 1400;
    const canvasHeight = 950;
    // SVG field pitch area: x=62..1322, y=60..870 (1260x810)
    const fieldLeft = 62;
    const fieldTop = 60;
    const fieldWidth = 1260;
    const fieldHeight = 810;

    // Chunk duration is read from metadata — don't duplicate the constant
    // on both sides of the wire.
    let chunkDurationMs = 300000;
    let totalChunks = 0;

    let app = null;
    let gameContainer = null;
    let playerSprites = {};
    let playerMap = {};
    let ballSprite = null;

    // Position data buffers: each entry is [timestamp, x, y] or
    // [timestamp, x, y, z]. States: [timestamp, "StateName"].
    let ballData = [];
    const playerData = {};
    const stateData = {};

    // Hint indices for cache-friendly sequential lookups (web viewer pattern).
    // Time advances monotonically during playback, so last-found index is a
    // near-perfect starting point for the next frame — O(1) amortised.
    let lastBallIdx = 0;
    const lastPlayerIdx = {};
    const lastStateIdx = {};

    const loadedChunks = new Set();
    const loadingChunks = new Set();

    let playing = false;
    let showStates = true;
    let currentTime = 0;
    let playbackSpeed = 1;
    const speeds = [1, 2, 4, 8, 16];
    let speedIdx = 0;
    let lastFrameTime = 0;

    // Gap threshold: if two samples are more than this far apart, snap
    // instead of interpolating. Otherwise goal resets (ball teleport to
    // centre spot) render as a 60m glide over 30ms.
    const INTERPOLATION_GAP_MS = 200;

    function getChunkNumber(time) {
        return Math.floor(time / chunkDurationMs);
    }

    async function loadChunk(chunkNum) {
        if (!Number.isFinite(chunkNum)
            || chunkNum < 0
            || chunkNum >= totalChunks
            || loadedChunks.has(chunkNum)
            || loadingChunks.has(chunkNum))
        {
            return;
        }
        loadingChunks.add(chunkNum);
        try {
            const res = await fetch('/api/match/' + matchId + '/chunk/' + chunkNum);
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const data = await res.json();
            mergeData(data);
            loadedChunks.add(chunkNum);
        } catch (err) {
            console.error('chunk ' + chunkNum + ' load failed:', err);
            setStatus('chunk ' + chunkNum + ' failed');
        } finally {
            loadingChunks.delete(chunkNum);
        }
    }

    // Chunks arrive in time-order, so appending is the common case and an
    // O(n) merge is only needed for out-of-order loads (rare: user scrub
    // back while a later chunk is still in flight).
    function mergeSorted(existing, incoming) {
        if (incoming.length === 0) return existing;
        if (existing.length === 0) return incoming;
        if (incoming[0][0] >= existing[existing.length - 1][0]) {
            // Fast path: append in-place.
            for (let i = 0; i < incoming.length; i++) existing.push(incoming[i]);
            return existing;
        }
        const merged = new Array(existing.length + incoming.length);
        let i = 0, j = 0, k = 0;
        while (i < existing.length && j < incoming.length) {
            merged[k++] = existing[i][0] <= incoming[j][0] ? existing[i++] : incoming[j++];
        }
        while (i < existing.length) merged[k++] = existing[i++];
        while (j < incoming.length) merged[k++] = incoming[j++];
        return merged;
    }

    function mergeData(data) {
        if (data.ball) ballData = mergeSorted(ballData, data.ball);
        if (data.players) {
            const entries = Object.entries(data.players);
            for (let e = 0; e < entries.length; e++) {
                const id = entries[e][0];
                const positions = entries[e][1];
                if (!playerData[id]) {
                    playerData[id] = positions.slice();
                    // Lazy sprite creation — handles substitutes appearing
                    // after the match has started. The first chunk won't
                    // contain their positions; a later chunk will.
                    ensurePlayerSprite(id, positions);
                } else {
                    playerData[id] = mergeSorted(playerData[id], positions);
                }
            }
        }
        if (data.states) {
            const entries = Object.entries(data.states);
            for (let e = 0; e < entries.length; e++) {
                const id = entries[e][0];
                const states = entries[e][1];
                stateData[id] = stateData[id]
                    ? mergeSorted(stateData[id], states)
                    : states.slice();
            }
        }
    }

    function ensurePlayerSprite(id, initialPositions) {
        if (playerSprites[id] || !gameContainer) return;
        const player = playerMap[id];
        if (!player || !initialPositions || initialPositions.length === 0) return;
        const sprite = createPlayerGraphic(player);
        const [px, py] = engineToPixel(initialPositions[0][1], initialPositions[0][2]);
        sprite.x = px;
        sprite.y = py;
        gameContainer.addChild(sprite);
        playerSprites[id] = sprite;
    }

    // Hint-based lookup — scans forward/back from the last-found index.
    // Time advances monotonically, so the answer is almost always `hint`
    // or `hint+1`. Falls back to binary search if the hint is useless
    // (e.g. after a scrub jump).
    function findIndexNear(arr, time, hint) {
        const len = arr.length;
        if (len === 0) return -1;
        if (hint >= 0 && hint < len) {
            if (arr[hint][0] <= time) {
                let i = hint;
                while (i + 1 < len && arr[i + 1][0] <= time) i++;
                return i;
            } else {
                let i = hint - 1;
                while (i >= 0 && arr[i][0] > time) i--;
                return Math.max(i, 0);
            }
        }
        let lo = 0, hi = len - 1;
        while (lo < hi) {
            const mid = (lo + hi + 1) >> 1;
            if (arr[mid][0] <= time) lo = mid; else hi = mid - 1;
        }
        return lo;
    }

    function interpolate(arr, idx, time) {
        const a = arr[idx];
        if (idx + 1 < arr.length) {
            const b = arr[idx + 1];
            const dt = b[0] - a[0];
            // Snap across big gaps (goal resets, half-time) instead of
            // gliding the ball 60m over 30ms.
            if (dt > 0 && dt <= INTERPOLATION_GAP_MS) {
                const t = (time - a[0]) / dt;
                return [
                    a[1] + (b[1] - a[1]) * t,
                    a[2] + (b[2] - a[2]) * t,
                    (a[3] || 0) + ((b[3] || 0) - (a[3] || 0)) * t,
                ];
            }
        }
        return [a[1], a[2], a[3] || 0];
    }

    function findState(stateArr, time, id) {
        if (!stateArr || stateArr.length === 0) return '';
        const idx = findIndexNear(stateArr, time, lastStateIdx[id] || 0);
        lastStateIdx[id] = idx;
        const full = stateArr[idx][1];
        const colon = full.indexOf(': ');
        return colon >= 0 ? full.substring(colon + 2) : full;
    }

    function createPlayerGraphic(player) {
        const container = new PIXI.Container();
        const isGk = player.position === 'GK';
        const isHome = player.is_home;
        const bg = isGk ? '#e6c619' : (isHome ? homeColorBg : awayColorBg);
        const fg = isGk ? '#000000' : (isHome ? homeColorFg : awayColorFg);

        const circle = new PIXI.Graphics();
        circle.circle(0, 0, 24).fill(bg).stroke({ width: 3, color: 0xffffff });
        container.addChild(circle);

        const numText = new PIXI.Text({ text: String(player.shirt_number), style: new PIXI.TextStyle({ fontSize: 20, fontWeight: 'bold', fill: fg, fontFamily: 'Arial' }) });
        numText.anchor.set(0.5, 0.5);
        container.addChild(numText);

        const nameText = new PIXI.Text({ text: player.last_name, style: new PIXI.TextStyle({ fontSize: 18, fill: '#ffffff', fontFamily: 'Arial', dropShadow: { alpha: 0.6, distance: 1, color: '#000000' } }) });
        nameText.anchor.set(0.5, 0);
        nameText.y = 28;
        container.addChild(nameText);

        const stateText = new PIXI.Text({ text: '', style: new PIXI.TextStyle({ fontSize: 16, fill: '#ffff66', fontFamily: 'Arial' }) });
        stateText.anchor.set(0.5, 0);
        stateText.y = 50;
        container.addChild(stateText);
        container._stateText = stateText;

        return container;
    }

    function engineToPixel(ex, ey) {
        return [
            fieldLeft + (ex / 840) * fieldWidth,
            fieldTop + (ey / 545) * fieldHeight,
        ];
    }

    function updatePositions(time) {
        // Ball — interpolate + scale for height
        lastBallIdx = findIndexNear(ballData, time, lastBallIdx);
        if (lastBallIdx >= 0 && ballSprite) {
            const [bx, by, bz] = interpolate(ballData, lastBallIdx, time);
            const [px, py] = engineToPixel(bx, by);
            ballSprite.x = px;
            ballSprite.y = py;
            // Lofted balls visually bigger — matches production viewer.
            const heightScale = 1.0 + Math.min((bz || 0) / 15.0, 0.4);
            ballSprite.scale.set(heightScale);
            document.getElementById('ball-coords-val').textContent =
                `${bx.toFixed(1)}, ${by.toFixed(1)}, ${(bz || 0).toFixed(1)}`;
        }

        // Players — interpolate + hide off-field substitutes
        const currentChunk = getChunkNumber(time);
        const chunkIsLoaded = loadedChunks.has(currentChunk);
        for (const id in playerSprites) {
            const positions = playerData[id];
            const sprite = playerSprites[id];
            if (!positions || positions.length === 0) {
                sprite.visible = false;
                continue;
            }
            const hint = lastPlayerIdx[id] || 0;
            const idx = findIndexNear(positions, time, hint);
            lastPlayerIdx[id] = idx;
            const firstTs = positions[0][0];
            const lastTs = positions[positions.length - 1][0];
            // Before their first sample → haven't come on yet. Hide.
            if (time + 1000 < firstTs) {
                sprite.visible = false;
                continue;
            }
            // Past their last sample — two cases:
            //  a) The chunk covering `time` has loaded and they still
            //     have no sample there → genuinely absent (subbed off,
            //     sent off, match ended). Hide.
            //  b) The chunk is still fetching → don't flash an empty
            //     field while the user scrubs. Freeze sprite at its
            //     last known position until data arrives.
            if (time > lastTs + 1000) {
                if (chunkIsLoaded) {
                    sprite.visible = false;
                    continue;
                }
                // Fall through — show at last-known position.
            }
            sprite.visible = true;
            const [px_e, py_e] = interpolate(positions, idx, time);
            const [px, py] = engineToPixel(px_e, py_e);
            sprite.x = px;
            sprite.y = py;
            if (sprite._stateText) {
                sprite._stateText.visible = showStates;
                if (showStates) {
                    sprite._stateText.text = findState(stateData[id], time, id);
                }
            }
        }
    }

    // Preload current + 2 chunks ahead. If a tab was backgrounded and dt
    // jumped across multiple chunks, all of them get queued — no silent
    // "positions freeze" gap.
    function preloadAround(time) {
        const current = getChunkNumber(time);
        for (let k = 0; k <= 2; k++) loadChunk(current + k);
    }

    function setStatus(text) {
        const el = document.getElementById('status');
        if (el) el.textContent = text || '';
    }

    function formatTime(ms) {
        // Show real match time, not a scaled 0–90'. A debug build runs
        // a 10-minute match (5 min per half); scaling to 90' hides that
        // and makes scrub positions misleading ("30'" on the slider is
        // actually minute 3.3 of the sim, so chunks for min 30 never
        // get requested because they don't exist).
        const totalSecs = Math.floor(ms / 1000);
        const m = Math.floor(totalSecs / 60);
        const s = totalSecs % 60;
        return m + ":" + (s < 10 ? "0" + s : s);
    }

    function gameLoop(now) {
        requestAnimationFrame(gameLoop);
        if (!playing) return;

        if (lastFrameTime === 0) lastFrameTime = now;
        const dt = (now - lastFrameTime) * playbackSpeed;
        lastFrameTime = now;
        currentTime += dt;
        if (currentTime >= matchTimeMsTotal) {
            currentTime = matchTimeMsTotal;
            playing = false;
            document.getElementById('btn-play').textContent = 'Play';
        }

        preloadAround(currentTime);
        updatePositions(currentTime);

        const slider = document.getElementById('time-slider');
        slider.value = (currentTime / matchTimeMsTotal) * 1000;
        document.getElementById('time-display').textContent = formatTime(currentTime);
    }

    function renderGoalMarkers() {
        const markersDiv = document.getElementById('goal-markers');
        markersDiv.innerHTML = '';
        for (let i = 0; i < goalsData.length; i++) {
            const goal = goalsData[i];
            const player = playerMap[goal.player_id];
            const isHome = player ? player.is_home : true;
            // Auto-goals go to the other team; flip the color to match.
            const sideIsHome = goal.is_auto_goal ? !isHome : isHome;
            const pct = (goal.time / matchTimeMsTotal) * 100;
            const marker = document.createElement('div');
            marker.className = 'goal-marker ' + (sideIsHome ? 'goal-marker-home' : 'goal-marker-away');
            marker.style.left = pct + '%';
            marker.textContent = '\u26BD';
            marker.title = (player ? player.last_name : 'P' + goal.player_id)
                + ' ' + Math.floor(goal.time / matchTimeMsTotal * 90) + "'"
                + (goal.is_auto_goal ? ' (OG)' : '');
            markersDiv.appendChild(marker);
        }
    }

    async function init() {
        try {
            const metaRes = await fetch('/api/match/' + matchId + '/metadata');
            if (!metaRes.ok) throw new Error('metadata HTTP ' + metaRes.status);
            const metadata = await metaRes.json();
            totalChunks = metadata.chunk_count || 0;
            // Read from server, don't hard-code on both sides.
            if (metadata.chunk_duration_ms) chunkDurationMs = metadata.chunk_duration_ms;
        } catch (err) {
            console.error('metadata load failed:', err);
            setStatus('metadata failed');
            return;
        }

        // Build player map BEFORE first chunk merges so lazy sprite creation
        // in mergeData has the lookup available.
        for (let i = 0; i < playersData.length; i++) playerMap[playersData[i].id] = playersData[i];

        app = new PIXI.Application();
        await app.init({ antialias: true, background: '#1a472a', width: canvasWidth, height: canvasHeight });
        document.getElementById('pixi-container').appendChild(app.canvas);

        const bgTexture = await PIXI.Assets.load('/static/images/match/field.svg');
        const background = new PIXI.Sprite(bgTexture);
        background.width = canvasWidth;
        background.height = canvasHeight;
        app.stage.addChild(background);

        gameContainer = new PIXI.Container();
        // Enable z-ordering so the ball always renders on top of players.
        // Default Pixi draw order is insertion order — since players get
        // added to the container lazily as chunks load (after the ball),
        // the ball ended up behind any player on top of it and was
        // invisible whenever someone dribbled.
        gameContainer.sortableChildren = true;
        app.stage.addChild(gameContainer);

        // Ball sprite — create before loading first chunk so mergeData can
        // position it on the first render.
        const ballContainer = new PIXI.Container();
        const ballCircle = new PIXI.Graphics();
        ballCircle.circle(0, 0, 6).fill(0xffffff).stroke({ width: 2, color: 0x000000 });
        ballContainer.addChild(ballCircle);
        // High zIndex puts the ball above every player sprite (default 0).
        ballContainer.zIndex = 1000;
        gameContainer.addChild(ballContainer);
        ballSprite = ballContainer;

        await loadChunk(0);
        renderGoalMarkers();
        updatePositions(0);

        function rewindToStart() {
            currentTime = 0;
            lastBallIdx = 0;
            for (const id in lastPlayerIdx) lastPlayerIdx[id] = 0;
            for (const id in lastStateIdx) lastStateIdx[id] = 0;
            // Defensive: the end-of-match updatePositions call may have
            // set some sprites invisible (sent-off / subbed-off past
            // their lastTs + 1s). Reset them here so updatePositions(0)
            // starts from a clean state — the visibility check will
            // flip them back off if needed.
            for (const id in playerSprites) playerSprites[id].visible = true;
            if (ballSprite) ballSprite.visible = true;
            document.getElementById('time-slider').value = 0;
            document.getElementById('time-display').textContent = formatTime(0);
            updatePositions(currentTime);
        }

        document.getElementById('btn-play').addEventListener('click', function() {
            if (currentTime >= matchTimeMsTotal) rewindToStart();
            playing = !playing;
            this.textContent = playing ? 'Pause' : 'Play';
            lastFrameTime = playing ? performance.now() : 0;
        });

        document.getElementById('btn-speed').addEventListener('click', function() {
            speedIdx = (speedIdx + 1) % speeds.length;
            playbackSpeed = speeds[speedIdx];
            this.textContent = playbackSpeed + 'x';
        });

        document.getElementById('btn-states').addEventListener('click', function() {
            showStates = !showStates;
            this.classList.toggle('active', showStates);
            // Force redraw so state labels hide/show on next tick
            updatePositions(currentTime);
        });

        const slider = document.getElementById('time-slider');
        slider.addEventListener('input', function() {
            currentTime = (this.value / 1000) * matchTimeMsTotal;
            document.getElementById('time-display').textContent = formatTime(currentTime);
            // Scrub: invalidate hints (time jumped non-monotonically)
            lastBallIdx = 0;
            for (const id in lastPlayerIdx) lastPlayerIdx[id] = 0;
            for (const id in lastStateIdx) lastStateIdx[id] = 0;
            preloadAround(currentTime);
            updatePositions(currentTime);
        });

        requestAnimationFrame(gameLoop);
    }

    init();
})();
</script>
</body>
</html>
