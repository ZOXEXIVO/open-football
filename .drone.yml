kind: pipeline
name: default

steps:
  - name: build
    image: docker:latest
    depends_on: [ clone ]
    volumes:
      - name: docker_sock
        path: /var/run/docker.sock
    commands:
      - docker build -t open-football:1.0.0.$$DRONE_BUILD_NUMBER -f "build/Football.Dockerfile" .
    when:
      branch:
        - master
      event:
        exclude:
          - pull_request

  - name: clear
    image: docker:dind
    depends_on: [ build ]
    privileged: true
    failure: ignore
    volumes:
      - name: docker_sock
        path: /var/run/docker.sock
    commands:
      - docker stop open-football || true
      - docker rm open-football || true
    when:
      branch:
        - master

  - name: deploy
    image: docker:dind
    depends_on: [ clear ]
    privileged: true
    failure: ignore
    volumes:
      - name: docker_sock
        path: /var/run/docker.sock
    commands:
      - docker run -d -p 0.0.0.0:18000:18000 --restart always -v /data/match_results:/app/match_results --name open-football open-football:1.0.0.$$DRONE_BUILD_NUMBER
    when:
      branch:
        - master
      event:
        exclude:
          - pull_request

volumes:
  - name: docker_sock
    host:
      path: /var/run/docker.sock

---

kind: pipeline
name: release

steps:
  - name: build-releases
    image: docker:latest
    depends_on: [ clone ]
    volumes:
      - name: docker_sock
        path: /var/run/docker.sock
    commands:
      - docker build --target artifacts -t open-football-release:${DRONE_TAG} -f "build/Football.Release.Dockerfile" .
      - mkdir -p dist
      - docker create --name release-tmp open-football-release:${DRONE_TAG}
      - docker cp release-tmp:/release/. dist/
      - docker rm release-tmp

  - name: publish-github
    image: plugins/github-release
    depends_on: [ build-releases ]
    settings:
      api_key:
        from_secret: github_token
      files:
        - dist/open-football-*
      title: "OpenFootball Release v${DRONE_TAG##release-}"
    when:
      event:
        - tag

volumes:
  - name: docker_sock
    host:
      path: /var/run/docker.sock

trigger:
  event:
    - tag
  ref:
    - refs/tags/release-*